site_name: IMDEO Docs
site_description: Documentation technique IMDEO

theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    # Mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    # Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide

extra_css:
  - stylesheets/extra.css

nav:
  - Accueil: index.md
  - Linux:
      - GRUB: Linux/grub.md
      - LVM: Linux/lvm.md
      - Sécuriser GRUB: Linux/secugrub.md
  - Système:
      - SSH: Système/ssh.md
